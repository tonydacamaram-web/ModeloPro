version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gestionpro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestionpro
      POSTGRES_USER: gestionpro_user
      POSTGRES_PASSWORD: gestionpro_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestionpro_user -d gestionpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gestionpro_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gestionpro.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
